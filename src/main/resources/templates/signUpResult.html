<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h3>회원가입</h3>
<form action="member" method="post">
    <p>아이디 : <span th:text="${member.id}"/></p>
    <p>비밀번호 : <span th:text="${member.passwd}"/></p>
    <p>거주지 : <span th:text="${member.city}"/></p>
    <p>성별 : <span th:text="${member.gender}"/></p>
    <p>취미 : <span th:each="hobby : ${member.hobby}" th:text="${hobby} + '|'"/></p>
    <p>가입인사: <span th:text="${member.greetings}"/></p>
    <p>
        <button type="submit">가입하기</button>
        <button type="reset">취소하기</button>
    </p>
</form>
</body>
</html>
